name: ESHOT Veri Güncellemesi

# ESHOT güzergah saatlerini resmi siteden (eshot.gov.tr) çekip
# eshot-*.json dosyalarını günceller. CORS kısıtı nedeniyle tarayıcıdan
# çekilemediği için bu workflow (Node.js, CORS yok) aracılığıyla yapılır.
#
# Tetikleyiciler:
#   - schedule: her gün 06:00 TR (UTC 03:00)
#   - workflow_dispatch: manuel çalıştırma

on:
  schedule:
    - cron: '0 3 * * *'   # 06:00 TR
  workflow_dispatch:

permissions:
  contents: write          # JSON dosyalarını commit+push için

concurrency:
  group: update-eshot
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node kur
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ESHOT erişilebilirlik kontrolü
        run: |
          echo "ESHOT sitesine bağlantı testi..."
          curl -sS -o /dev/null -w "HTTP %{http_code}, süre %{time_total}s\n" \
            --max-time 60 \
            -X POST "https://www.eshot.gov.tr/tr/UlasimSaatleri/-1" \
            -H "User-Agent: travel-timer-build-script/1.0" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "hatId=776&hatYon=0&bisikletAparatliMi=False" || echo "curl başarısız"

      - name: ESHOT verisini çek
        run: node scripts/fetch-eshot.js

      - name: Değişiklik kontrol et
        id: diff
        run: |
          if git diff --quiet -- eshot-*.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Değişiklik yok, commit atlanıyor."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit ve push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eshot-*.json
          git commit -m "chore: ESHOT veri güncellemesi (otomatik) [skip ci]"
          git push
